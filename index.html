<script>
const CURRENCIES={
  DKK:{name:'Danske kroner',flag:'🇩🇰',rate:1},
  EUR:{name:'Euro',flag:'🇪🇺',rate:7.46},
  USD:{name:'Amerikanske dollars',flag:'🇺🇸',rate:6.44},
  GBP:{name:'Britiske pund',flag:'🇬🇧',rate:8.65},
  JPY:{name:'Japanske yen',flag:'🇯🇵',rate:0.0403},
  CNY:{name:'Kinesiske yuan',flag:'🇨🇳',rate:0.943},
};
const CAT_COLORS=['#ff6b6b','#ffd166','#06d6a0','#4cc9f0','#c77dff','#f4a261','#e76f51','#52b69a','#b5179e','#74c69d'];
const AVATAR_COLORS=['#ff6b6b','#ffd166','#06d6a0','#4cc9f0','#c77dff','#f4a261','#e76f51','#52b69a','#ff9f43','#a29bfe'];

// ══════════════════════════════════════════════
// STATE
// ══════════════════════════════════════════════
const DEFAULTS={
  apiKey:'',
  persons:[
    {id:'p1',name:'Rosa', color:'#ff6b6b',budget:1500,currency:'EUR',rate:7.46,homeCurrency:'DKK',categories:['Mad','Souvenirs','Aktivitet','Andet']},
    {id:'p2',name:'Lily', color:'#4cc9f0',budget:1500,currency:'EUR',rate:7.46,homeCurrency:'DKK',categories:['Mad','Souvenirs','Aktivitet','Andet']},
  ],
  entries:[],
  customRates:{}
};
function loadState(){try{const s=JSON.parse(localStorage.getItem('tb3_state'));if(!s)return DEFAULTS;if(!s.customRates)s.customRates={};s.persons.forEach(p=>{if(!p.color)p.color=AVATAR_COLORS[0]});return s}catch{return DEFAULTS}}
function saveState(){
  localStorage.setItem('tb3_state',JSON.stringify(S));
  syncToFirebase();
}
let S=loadState();

// Trip code state
let tripCode=localStorage.getItem('tb3_tripCode')||null;
let fbUnsubscribe=null;

let currentScreen='home';
let currentPersonId=null;
let currentPVTab='add';
let settingsDraft=null;
let editingEntryId=null;
let historyFilter='Alle';
let uploadMode='cam';

// ══════════════════════════════════════════════
// NAVIGATION
// ══════════════════════════════════════════════
function navTo(name,personId){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('screen-'+name).classList.add('active');
  const navBtn=document.getElementById('nav-'+name);
  if(navBtn)navBtn.classList.add('active');
  currentScreen=name;
  document.getElementById('addFab').classList.remove('visible');
  if(name==='home')renderHome();
  if(name==='person'){currentPersonId=personId||currentPersonId;renderPersonView();document.getElementById('addFab').classList.add('visible')}
  if(name==='calc')renderCalc();
  if(name==='settings')renderSettings();
}

// ══════════════════════════════════════════════
// HOME — PROFILE SELECT
// ══════════════════════════════════════════════
function renderHome(){
  // Update trip button
  const tripBtn=document.getElementById('tripBtn');
  if(tripBtn){
    tripBtn.textContent=tripCode?`🌍 ${tripCode}`:'🌍 Del rejse';
    tripBtn.style.color=tripCode?'var(--yellow)':'var(--text3)';
  }
  const el=document.getElementById('homeContent');
  if(!S.persons.length){
    el.innerHTML=`<div style="text-align:center;padding:60px 24px">
      <div style="font-size:56px;margin-bottom:16px">✈️</div>
      <div style="font-size:20px;font-weight:700;margin-bottom:8px">Ingen profiler endnu</div>
      <div style="font-size:14px;color:var(--text3);margin-bottom:28px">Opret en profil for at komme i gang</div>
      <button class="btn-primary" style="max-width:240px;margin:0 auto" onclick="openNewPersonModal()">Opret profil</button>
    </div>`;
    
    return;
  }

  // total remaining
  let totalLeft=0,totalBudget=0,totalSpentHome=0;
  S.persons.forEach(p=>{
    const spent=S.entries.filter(e=>e.personId===p.id).reduce((a,e)=>a+e.price,0);
    const sh=p.currency!==p.homeCurrency?spent*getRate(p.currency,p.homeCurrency):spent;
    totalBudget+=p.budget;
    totalSpentHome+=sh;
    totalLeft+=p.budget-sh;
  });
  const totalPct=Math.min(100,(totalSpentHome/Math.max(totalBudget,1))*100);
  const totalCol=totalPct<60?'#06d6a0':totalPct<85?'#ffd166':'#ff6b6b';
  

  // Hero banner
  let html=`<div style="margin:12px 0 16px;background:var(--s1);border:1px solid var(--border);border-radius:var(--r);padding:20px;position:relative;overflow:hidden">
    <div style="position:absolute;top:-20px;right:-20px;width:120px;height:120px;border-radius:50%;background:${totalCol};opacity:0.07;pointer-events:none"></div>
    <div style="position:absolute;bottom:-30px;left:30px;width:80px;height:80px;border-radius:50%;background:var(--purple);opacity:0.05;pointer-events:none"></div>
    <div style="font-size:11px;font-weight:600;color:var(--text3);letter-spacing:1px;text-transform:uppercase;margin-bottom:8px">Samlet tilbage</div>
    <div style="font-size:38px;font-weight:700;letter-spacing:-2px;color:${totalCol};line-height:1;margin-bottom:4px">${totalLeft.toFixed(0)} <span style="font-size:18px;font-weight:500;opacity:.7">DKK</span></div>
    <div style="font-size:12px;color:var(--text3);margin-bottom:14px">af ${totalBudget.toFixed(0)} DKK samlet budget</div>
    <div style="height:6px;background:var(--s3);border-radius:3px;overflow:hidden">
      <div style="height:100%;width:${totalPct}%;background:linear-gradient(90deg,${totalCol},${totalCol}aa);border-radius:3px;transition:width .5s ease"></div>
    </div>
  </div>`;

  // Overview list — profiles as clickable rows
  html+=`<div style="background:var(--s1);border:1px solid var(--border);border-radius:var(--r);overflow:hidden">
    <div style="padding:10px 14px 8px;display:flex;align-items:center;justify-content:space-between">
      <div style="font-size:11px;font-weight:600;color:var(--text3);letter-spacing:1px;text-transform:uppercase">Profiler</div>
      <button onclick="openAllProfilesMenu()" style="background:none;border:none;color:var(--text3);font-size:20px;cursor:pointer;padding:0 2px;letter-spacing:2px;line-height:1" title="Administrer alle profiler" onmouseenter="this.style.color='var(--text)'" onmouseleave="this.style.color='var(--text3)'">⋯</button>
    </div>`;

  S.persons.forEach(p=>{
    const spent=S.entries.filter(e=>e.personId===p.id).reduce((a,e)=>a+e.price,0);
    const spentHome=p.currency!==p.homeCurrency?spent*getRate(p.currency,p.homeCurrency):spent;
    const remaining=p.budget-spentHome;
    const pct=Math.min(100,(spentHome/p.budget)*100);
    const col=pct<60?'#06d6a0':pct<85?'#ffd166':'#ff6b6b';
    const initial=p.name.charAt(0).toUpperCase();
    const travelStr=p.currency!==p.homeCurrency?` · ${spent.toFixed(0)} ${p.currency}`:'';
    html+=`<div style="display:flex;align-items:center;border-top:1px solid var(--border)" ontouchstart="this.querySelector('.pr').style.background='var(--s2)'" ontouchend="this.querySelector('.pr').style.background=''">
      <div class="pr" onclick="navTo('person','${p.id}')" style="display:flex;align-items:center;gap:12px;padding:12px 14px;cursor:pointer;flex:1;min-width:0" onmouseenter="this.style.background='var(--s2)'" onmouseleave="this.style.background=''">
        <div style="width:40px;height:40px;border-radius:50%;background:${p.color};display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;color:white;flex-shrink:0">${initial}</div>
        <div style="flex:1;min-width:0">
          <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:5px">
            <span style="font-size:15px;font-weight:600">${esc(p.name)}</span>
            <span style="font-size:14px;font-weight:700;color:${col}">${remaining.toFixed(0)} ${p.homeCurrency}</span>
          </div>
          <div style="display:flex;justify-content:space-between;align-items:center;gap:10px">
            <div style="flex:1;height:4px;background:var(--s3);border-radius:2px;overflow:hidden">
              <div style="height:100%;width:${pct}%;background:${col};border-radius:2px"></div>
            </div>
            <span style="font-size:11px;color:var(--text3);white-space:nowrap;flex-shrink:0">brugt ${spentHome.toFixed(0)} ${p.homeCurrency}${travelStr}</span>
          </div>
        </div>
        <div style="color:var(--text3);font-size:18px;flex-shrink:0;margin-left:4px">›</div>
      </div>
      <button onclick="openHomePersonMenu('${p.id}')" style="background:none;border:none;color:var(--text3);font-size:20px;padding:0 14px;cursor:pointer;letter-spacing:2px;flex-shrink:0;align-self:stretch;display:flex;align-items:center" onmouseenter="this.style.color='var(--text)'" onmouseleave="this.style.color='var(--text3)'">⋯</button>
    </div>`;
  });

  // NY button at bottom of the list
  html+=`<div onclick="openNewPersonModal()" style="display:flex;align-items:center;gap:12px;padding:12px 14px;border-top:1px solid var(--border);cursor:pointer;" onmouseenter="this.style.background='var(--s2)'" onmouseleave="this.style.background=''" ontouchstart="this.style.background='var(--s2)'" ontouchend="this.style.background=''">
    <div style="width:40px;height:40px;border-radius:50%;background:var(--s3);border:2px dashed var(--text3);display:flex;align-items:center;justify-content:center;font-size:20px;color:var(--text3);flex-shrink:0">＋</div>
    <span style="font-size:15px;font-weight:500;color:var(--text3)">Tilføj ny profil</span>
  </div>`;

  html+=`</div>`;
  el.innerHTML=html;
}

// ══════════════════════════════════════════════
// PERSON VIEW
// ══════════════════════════════════════════════
function renderPersonView(){
  const p=S.persons.find(x=>x.id===currentPersonId);
  if(!p)return navTo('home');
  const initial=p.name.charAt(0).toUpperCase();

  // Header
  document.getElementById('pvAvatar').style.background=p.color;
  document.getElementById('pvAvatar').textContent=initial;
  document.getElementById('pvName').textContent=p.name;

  const spent=S.entries.filter(e=>e.personId===p.id).reduce((a,e)=>a+e.price,0);
  const spentHome=p.currency!==p.homeCurrency?spent*getRate(p.currency,p.homeCurrency):spent;
  const remaining=p.budget-spentHome;
  const pct=Math.min(100,(spentHome/p.budget)*100);
  const col=pct<60?'#06d6a0':pct<85?'#ffd166':'#ff6b6b';

  document.getElementById('pvBudgetLine').textContent=`Budget: ${p.budget} ${p.homeCurrency} · ${CURRENCIES[p.currency]?.flag||''} ${p.currency}`;
  document.getElementById('pvSummary').innerHTML=`
    <div class="pv-stat"><div class="pv-stat-val" style="color:${col}">${remaining.toFixed(0)}</div><div class="pv-stat-lbl">Tilbage (${p.homeCurrency})</div></div>
    <div class="pv-stat"><div class="pv-stat-val">${spentHome.toFixed(0)}</div><div class="pv-stat-lbl">Brugt (${p.homeCurrency})</div></div>
    ${p.currency!==p.homeCurrency?`<div class="pv-stat"><div class="pv-stat-val" style="color:var(--yellow)">${spent.toFixed(2)}</div><div class="pv-stat-lbl">Brugt (${p.currency})</div></div>`:''}
    <div class="pv-stat"><div class="pv-stat-val">${S.entries.filter(e=>e.personId===p.id).length}</div><div class="pv-stat-lbl">Køb</div></div>
  `;
  document.getElementById('pvProgressFill').style.cssText=`width:${pct}%;background:${col}`;

  // Tabs
  document.getElementById('pvTabAdd').classList.toggle('active',currentPVTab==='add');
  document.getElementById('pvTabHistory').classList.toggle('active',currentPVTab==='history');

  if(currentPVTab==='add')renderAddTab(p);
  else renderHistoryTab(p);
}

function switchPVTab(tab){
  currentPVTab=tab;

function submitEntry(){
  const name=document.getElementById('entryName')?.value.trim();
  const price=parseFloat(document.getElementById('entryPrice')?.value);
  const cat=document.getElementById('entryCat')?.value;
  const dateVal=document.getElementById('entryDate')?.value;
  if(!name){toast('Skriv hvad du har købt 😊');return}
  if(!price||price<=0){toast('Indtast en gyldig pris');return}
  const ts=dateVal?new Date(dateVal).getTime():Date.now();
  S.entries.push({id:'e'+Date.now(),personId:currentPersonId,name,price,category:cat,ts});
  saveState();
  document.getElementById('entryName').value='';
  document.getElementById('entryPrice').value='';
  document.getElementById('previewImg').style.display='none';
  document.getElementById('aiSuggestion').style.display='none';
  document.getElementById('uploadTrigger').style.display='flex';
  renderPersonView();
  toast('Tilføjet! ✓');
}

// ══════════════════════════════════════════════
// HISTORY TAB
// ══════════════════════════════════════════════
function renderHistoryTab(p){
  const entries=S.entries.filter(e=>e.personId===p.id);
  const sorted=[...entries].sort((a,b)=>b.ts-a.ts);
  const cats=['Alle',...p.categories];

  const filterHtml=`<div class="filter-row">${cats.map(c=>`
    <div class="filter-chip ${historyFilter===c?'active':''}" onclick="setHistoryFilter('${esc(c)}')">${esc(c)}</div>
  `).join('')}</div>`;

  const filtered=historyFilter==='Alle'?sorted:sorted.filter(e=>e.category===historyFilter);

  if(!filtered.length){
    document.getElementById('pvContent').innerHTML=filterHtml+`<div class="empty"><div class="ei">🛍️</div><p>${historyFilter==='Alle'?'Ingen køb endnu':'Ingen køb i denne kategori'}</p></div>`;
    return;
  }

  const entriesHtml=filtered.map(e=>{
    const priceHome=p.currency!==p.homeCurrency?(e.price*getRate(p.currency,p.homeCurrency)).toFixed(0):null;
    const catIdx=p.categories.indexOf(e.category);
    const col=CAT_COLORS[catIdx>=0?catIdx%CAT_COLORS.length:0];
    const date=new Date(e.ts).toLocaleDateString('da-DK',{day:'numeric',month:'short'});
    return `<div class="entry-item">
      <div class="entry-dot" style="background:${col}"></div>
      <div class="entry-info">
        <div class="entry-name">${esc(e.name)}</div>
        <div class="entry-meta">${esc(e.category)} · ${date}</div>
      </div>
      <div class="entry-prices">
        <div class="entry-price-main">${e.price.toFixed(2)} ${esc(p.currency)}</div>
        ${priceHome?`<div class="entry-price-sub">≈ ${priceHome} ${esc(p.homeCurrency)}</div>`:''}
      </div>
      <div class="entry-actions">
        <button class="entry-btn edit" onclick="openEditEntry('${e.id}')">✏️</button>
        <button class="entry-btn del" onclick="deleteEntry('${e.id}')">✕</button>
      </div>
    </div>`;
  }).join('');

  document.getElementById('pvContent').innerHTML=filterHtml+entriesHtml;
}

function setHistoryFilter(cat){historyFilter=cat;renderPersonView()}
function deleteEntry(id){S.entries=S.entries.filter(e=>e.id!==id);saveState();renderPersonView();toast('Slettet')}
function openEditEntry(id){
  const e=S.entries.find(x=>x.id===id);
  if(!e)return;
  editingEntryId=id;
  const p=S.persons.find(x=>x.id===e.personId);
  const catOptions=p.categories.map(c=>`<option value="${esc(c)}" ${c===e.category?'selected':''}>${esc(c)}</option>`).join('');
  const dateVal=new Date(e.ts).toISOString().split('T')[0];
  document.getElementById('editEntryContent').innerHTML=`
    <div class="field-wrap"><label class="field-label">Navn</label>
      <input class="field-input" id="eeN" value="${esc(e.name)}"></div>
    <div class="two-col" style="margin-bottom:14px">
      <div><label class="field-label">Pris (${esc(p.currency)})</label>
        <input class="field-input" id="eeP" type="number" value="${e.price}" step="0.01"></div>
      <div><label class="field-label">Dato</label>
        <input class="field-input" id="eeD" type="date" value="${dateVal}"></div>
    </div>
    <div class="field-wrap"><label class="field-label">Kategori</label>
      <select class="field-select" id="eeC">${catOptions}</select></div>
    <button class="btn-primary" onclick="saveEditEntry()">Gem ændringer ✓</button>
    <button class="btn-secondary" onclick="closeModal('editEntryModal')">Annuller</button>`;
  openModal('editEntryModal');
}
function saveEditEntry(){
  const e=S.entries.find(x=>x.id===editingEntryId);
  if(!e)return;
  e.name=document.getElementById('eeN').value.trim()||e.name;
  e.price=parseFloat(document.getElementById('eeP').value)||e.price;
  e.category=document.getElementById('eeC').value;
  const dv=document.getElementById('eeD').value;
  if(dv)e.ts=new Date(dv).getTime();
  saveState();closeModal('editEntryModal');renderPersonView();toast('Opdateret ✓');
}

      <div class="action-info"><div class="action-title">Nulstil budget</div><div class="action-sub">Slet alle ${S.entries.filter(e=>e.personId===p.id).length} køb, behold profil</div></div>

function resetPersonEntries(id){
  const p=S.persons.find(x=>x.id===id);
  if(!p)return;
  showConfirm({
    icon:'🔄',
    title:`Nulstil ${p.name}?`,
    sub:`Sletter alle ${S.entries.filter(e=>e.personId===id).length} køb — profilen beholdes`,
    confirmLabel:'Ja, nulstil',
    onConfirm:()=>{
      S.entries=S.entries.filter(e=>e.personId!==id);
      saveState();
      closeModal('personMenuModal');
      if(currentScreen==='person')renderPersonView();
      else renderHome();
      toast('Budget nulstillet ✓');
    }
  });
}

// ══════════════════════════════════════════════
// CONFIRM DIALOG (replaces browser confirm())
// ══════════════════════════════════════════════
function showConfirm({icon,title,sub,confirmLabel,confirmStyle,onConfirm}){
  // Store callback
  window._confirmCb=onConfirm;
  document.getElementById('confirmContent').innerHTML=`
    <div style="text-align:center;padding:8px 0 20px">
      <div style="font-size:40px;margin-bottom:14px">${icon}</div>
      <div style="font-size:17px;font-weight:600;margin-bottom:8px">${title}</div>
      <div style="font-size:13px;color:var(--text3);margin-bottom:24px">${sub}</div>
      <button class="btn-primary" style="margin-bottom:8px;${confirmStyle||''}" onclick="window._confirmCb&&window._confirmCb();closeModal('confirmModal')">${confirmLabel}</button>
      <button class="btn-secondary" onclick="closeModal('confirmModal')">Annuller</button>
    </div>`;
  openModal('confirmModal');
}
function deletePerson(id){
  const p=S.persons.find(x=>x.id===id);
  if(!p)return;
  showConfirm({
    icon:'🗑️',
    title:`Slet ${p.name}?`,
    sub:'Profil og alle køb slettes permanent',
    confirmLabel:'Ja, slet',
    confirmStyle:'background:var(--red)',
    onConfirm:()=>{
      S.entries=S.entries.filter(e=>e.personId!==id);
      S.persons=S.persons.filter(x=>x.id!==id);
      saveState();navTo('home');toast('Profil slettet');
    }
  });
}

function openAllProfilesMenu(){
  if(!S.persons.length){toast('Ingen profiler endnu');return}

  const personSections=S.persons.map(p=>{
    const entryCount=S.entries.filter(e=>e.personId===p.id).length;
    const spent=S.entries.filter(e=>e.personId===p.id).reduce((a,e)=>a+e.price,0);
    const spentHome=p.currency!==p.homeCurrency?spent*getRate(p.currency,p.homeCurrency):spent;
    const remaining=(p.budget-spentHome).toFixed(0);
    const col=parseFloat(remaining)>=0?'var(--green)':'var(--red)';
    return `
    <div style="background:var(--s2);border:1px solid var(--border);border-radius:var(--r-sm);margin-bottom:10px;overflow:hidden">
      <div style="display:flex;align-items:center;gap:12px;padding:12px 14px;border-bottom:1px solid var(--border)">
        <div style="width:38px;height:38px;border-radius:50%;background:${p.color};display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;color:white;flex-shrink:0">${p.name.charAt(0).toUpperCase()}</div>
        <div style="flex:1">
          <div style="font-size:15px;font-weight:600">${esc(p.name)}</div>
          <div style="font-size:12px;color:var(--text3)"><span style="color:${col};font-weight:600">${remaining} ${p.homeCurrency} tilbage</span> · ${entryCount} køb</div>
        </div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--border)">
        <button onclick="closeModal('personMenuModal');openPersonSettings('${p.id}')" style="background:var(--s1);border:none;color:var(--text2);font-size:13px;padding:11px 8px;cursor:pointer;font-family:'Outfit',sans-serif;display:flex;align-items:center;justify-content:center;gap:6px" onmouseenter="this.style.background='var(--s2)'" onmouseleave="this.style.background='var(--s1)'">⚙️ Rediger</button>
        <button onclick="closeModal('personMenuModal');exportPersonPDF('${p.id}')" style="background:var(--s1);border:none;color:var(--text2);font-size:13px;padding:11px 8px;cursor:pointer;font-family:'Outfit',sans-serif;display:flex;align-items:center;justify-content:center;gap:6px" onmouseenter="this.style.background='var(--s2)'" onmouseleave="this.style.background='var(--s1)'">📄 PDF</button>
        <button onclick="closeModal('personMenuModal');resetPersonEntries('${p.id}')" style="background:var(--s1);border:none;color:var(--text2);font-size:13px;padding:11px 8px;cursor:pointer;font-family:'Outfit',sans-serif;display:flex;align-items:center;justify-content:center;gap:6px" onmouseenter="this.style.background='var(--s2)'" onmouseleave="this.style.background='var(--s1)'">🔄 Nulstil</button>
        <button onclick="closeModal('personMenuModal');deletePerson('${p.id}')" style="background:var(--s1);border:none;color:var(--red);font-size:13px;padding:11px 8px;cursor:pointer;font-family:'Outfit',sans-serif;display:flex;align-items:center;justify-content:center;gap:6px" onmouseenter="this.style.background='var(--s2)'" onmouseleave="this.style.background='var(--s1)'">🗑️ Slet</button>
      </div>
    </div>`;
  }).join('');

  document.getElementById('personMenuContent').innerHTML=`
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;padding-bottom:14px;border-bottom:1px solid var(--border)">
      <div style="font-size:17px;font-weight:600">Alle profiler</div>

  openModal('personMenuModal');

function buildPersonHTML(p, includePageBreak){
  const entries=[...S.entries.filter(e=>e.personId===p.id)].sort((a,b)=>a.ts-b.ts);
  const spent=entries.reduce((a,e)=>a+e.price,0);
  const spentHome=p.currency!==p.homeCurrency?spent*getRate(p.currency,p.homeCurrency):spent;
  const remaining=p.budget-spentHome;
  const pct=Math.min(100,(spentHome/p.budget)*100);
  const col=pct<60?'#06d6a0':pct<85?'#f59e0b':'#ef4444';
  const initial=p.name.charAt(0).toUpperCase();
  const extraTh=p.currency!==p.homeCurrency?`<th class="amt-home">≈ ${p.homeCurrency}</th>`:'';
  const pb=includePageBreak?'page-break-before:always;padding-top:8px;':'';

  const rows=entries.map(e=>{
    const priceHome=p.currency!==p.homeCurrency?`<td class="amt-home">≈${(e.price*getRate(p.currency,p.homeCurrency)).toFixed(0)}</td>`:'';
    const date=new Date(e.ts).toLocaleDateString('da-DK',{day:'numeric',month:'short'});
    return `<tr><td style="color:#aaa;white-space:nowrap">${date}</td><td>${e.name}</td><td style="color:#aaa">${e.category}</td><td class="amt">${e.price.toFixed(2)}</td>${priceHome}</tr>`;
  }).join('');

  const travelStat=p.currency!==p.homeCurrency
    ?`<div class="stat"><div class="stat-val" style="color:#f59e0b">${spent.toFixed(2)} ${p.currency}</div><div class="stat-lbl">Brugt ${p.currency}</div></div>`:'';

  return `<div style="${pb}">
    <div class="person-header">
      <div class="avatar" style="background:${p.color}">${initial}</div>
      <div><div class="person-name">${p.name}</div><div class="person-meta">${CURRENCIES[p.currency]?.flag||''} ${p.currency}→${p.homeCurrency} · kurs ${p.rate}</div></div>
    </div>
    <div class="stats-row">
      <div class="stat"><div class="stat-val">${p.budget}</div><div class="stat-lbl">Budget ${p.homeCurrency}</div></div>
      <div class="stat"><div class="stat-val">${spentHome.toFixed(0)}</div><div class="stat-lbl">Brugt ${p.homeCurrency}</div></div>
      ${travelStat}
      <div class="stat"><div class="stat-val" style="color:${col}">${remaining.toFixed(0)}</div><div class="stat-lbl">Tilbage ${p.homeCurrency}</div></div>
    </div>
    <div class="bar-wrap"><div class="bar-fill" style="width:${pct}%;background:${col}"></div></div>
    ${!entries.length
      ? `<p style="color:#ccc;font-size:12px;padding:8px 0">Ingen køb registreret.</p>`
      : `<table>
          <thead><tr><th>Dato</th><th>Hvad</th><th>Kategori</th><th class="amt">${p.currency}</th>${extraTh}</tr></thead>
          <tbody>${rows}</tbody>
          <tfoot><tr>
            <td colspan="3">Total</td>
            <td class="amt">${spent.toFixed(2)} ${p.currency}</td>
            ${p.currency!==p.homeCurrency?`<td class="amt-home">≈${spentHome.toFixed(0)} ${p.homeCurrency}</td>`:''}
          </tr></tfoot>
        </table>`}
  </div>`;
}

async function handleImageFile(file){
  if(!file)return;
  const reader=new FileReader();
  reader.onload=async(ev)=>{
    const img=document.getElementById('previewImg');
    if(img){img.src=ev.target.result;img.style.display='block'}
    const trigger=document.getElementById('uploadTrigger');
    if(trigger)trigger.style.display='none';
    if(!S.apiKey){toast('Tilføj API-nøgle i Indstillinger');return}
    const proc=document.getElementById('aiProcessing');
    const sugg=document.getElementById('aiSuggestion');
    if(proc)proc.style.display='block';
    if(sugg)sugg.style.display='none';
    try{
      const b64=ev.target.result.split(',')[1];
      const result=await callVisionAPI(b64,file.type||'image/jpeg');
      if(proc)proc.style.display='none';
      if(result&&sugg){
        sugg.style.display='block';
        document.getElementById('aiSuggContent').innerHTML=`
          <div style="margin-bottom:8px"><div style="font-size:11px;color:var(--text3);margin-bottom:4px">Navn</div>
          <input class="field-input" id="aiName" value="${esc(result.name)}" style="font-size:14px;padding:10px 12px"></div>
          <div style="margin-bottom:12px"><div style="font-size:11px;color:var(--text3);margin-bottom:4px">Pris</div>
          <input class="field-input" id="aiPrice" value="${result.price}" type="number" step="0.01" style="font-size:14px;padding:10px 12px"></div>
          <button class="btn-primary" style="padding:12px" onclick="applyAI()">Brug dette ➜</button>`;
      }
    }catch{if(proc)proc.style.display='none';toast('Kunne ikke aflæse billedet 😕')}
  };
  reader.readAsDataURL(file);
}
async function callVisionAPI(b64,mime){
  const res=await fetch('https://tripbudget-api.peterlambek.workers.dev/',{method:'POST',
    headers:{'Content-Type':'application/json','x-api-key':S.apiKey,'anthropic-version':'2023-06-01'},
    body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:150,messages:[{role:'user',content:[
      {type:'image',source:{type:'base64',media_type:mime,data:b64}},
      {type:'text',text:'Look at this price tag or product image. Extract the item name and price. Reply ONLY with valid JSON, no markdown: {"name":"item name","price":9.99}. Use 0 if no price visible.'}
    ]}]})});
  const data=await res.json();
  if(data.error)throw new Error(data.error.message);
  return JSON.parse(data.content.map(i=>i.text||'').join('').replace(/```json|```/g,'').trim());
}

// CALCULATOR
// ══════════════════════════════════════════════
let calcInput='0',calcFromCur='EUR',calcToCur='DKK';
function getRate(from,to){
  if(from===to)return 1;
  const key=`${from}_${to}`,keyR=`${to}_${from}`;
  if(S.customRates[key])return S.customRates[key];
  if(S.customRates[keyR])return 1/S.customRates[keyR];
  for(const p of S.persons){
    if(p.currency===from&&p.homeCurrency===to)return p.rate;
    if(p.currency===to&&p.homeCurrency===from)return 1/p.rate;
  }
  const fDKK=CURRENCIES[from]?.rate||1,tDKK=CURRENCIES[to]?.rate||1;
  return fDKK/tDKK;
}
function buildCurOpts(selId,selected){
  document.getElementById(selId).innerHTML=Object.entries(CURRENCIES).map(([c,i])=>`<option value="${c}" ${c===selected?'selected':''}>${i.flag} ${c}</option>`).join('');
}
function renderCalc(){
  buildCurOpts('calcFrom',calcFromCur);buildCurOpts('calcTo',calcToCur);
  document.getElementById('quickAmounts').innerHTML=[5,10,20,50,100,200].map(n=>`<button class="quick-btn" onclick="calcSetAmount(${n})">${n}</button>`).join('');
  calcUpdate();renderRatesTable();
}
function calcUpdate(){
  calcFromCur=document.getElementById('calcFrom').value;
  calcToCur=document.getElementById('calcTo').value;
  const amt=parseFloat(calcInput)||0,rate=getRate(calcFromCur,calcToCur);
  document.getElementById('calcAmount').textContent=calcInput==='0'?'0':parseFloat(calcInput).toLocaleString('da-DK',{maximumFractionDigits:2});
  document.getElementById('calcConverted').textContent=`= ${(amt*rate).toLocaleString('da-DK',{minimumFractionDigits:2,maximumFractionDigits:2})} ${calcToCur}`;
  document.getElementById('calcRateInfo').textContent=`1 ${calcFromCur} = ${rate.toFixed(4)} ${calcToCur}`;
}
function calcKey(k){
  if(k==='C')calcInput='0';
  else if(k==='⌫')calcInput=calcInput.length>1?calcInput.slice(0,-1):'0';
  else if(k==='+')calcInput=String((parseFloat(calcInput)||0)+50);
  else if(k==='-')calcInput=String(Math.max(0,(parseFloat(calcInput)||0)-10));
  else if(k==='.')calcInput.includes('.')?null:calcInput+='.';
  else calcInput=calcInput==='0'?k:calcInput+k;
  calcUpdate();
}
function calcSetAmount(n){calcInput=String(n);calcUpdate()}
function calcSwap(){const t=calcFromCur;calcFromCur=calcToCur;calcToCur=t;document.getElementById('calcFrom').value=calcFromCur;document.getElementById('calcTo').value=calcToCur;calcUpdate()}
function renderRatesTable(){
  document.getElementById('ratesTable').innerHTML=[['EUR','DKK'],['USD','DKK'],['GBP','DKK'],['JPY','DKK'],['CNY','DKK'],['USD','EUR'],['GBP','EUR']].map(([f,t])=>`
    <div style="display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--border)">
      <span style="font-size:14px">${CURRENCIES[f]?.flag||''} ${f} → ${CURRENCIES[t]?.flag||''} ${t}</span>
      <span style="font-size:14px;font-weight:600;color:var(--green)">${getRate(f,t).toFixed(4)}</span>
    </div>`).join('');
}

      </div>
      <div class="field-wrap"><label class="field-label">Navn</label>
        <input class="field-input" value="${esc(p.name)}" oninput="draftSet(${i},'name',this.value);updateSettingsAvatar(${i},this.value)"></div>
      <div class="field-wrap"><label class="field-label">Avatar farve</label>
        <div class="color-swatches">${swatches}</div></div>
      <div class="two-col" style="margin-bottom:14px">
        <div><label class="field-label">Budget</label>
          <input class="field-input" type="number" value="${p.budget}" oninput="draftSet(${i},'budget',parseFloat(this.value)||0)"></div>
        <div><label class="field-label">Hjemvaluta</label>
          <select class="field-select" onchange="draftSetHomeCurrency(${i},this.value)">${homeOpts}</select></div>
      </div>
      <div class="two-col" style="margin-bottom:14px">
        <div><label class="field-label">Rejsevaluta</label>
          <select class="field-select" id="curSel_${i}" onchange="draftSetCurrency(${i},this.value)">${curOpts}</select></div>
        <div>
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
            <label class="field-label" style="margin-bottom:0" id="rateLabel_${i}">Kurs (1 ${esc(p.currency)} =)</label>
            <button onclick="draftRefreshRate(${i})" style="background:none;border:none;color:var(--blue);font-size:11px;cursor:pointer;font-family:'Outfit',sans-serif;padding:0" title="Hent seneste kurs">↺ Opdater</button>
          </div>
          <input class="field-input" id="rateInp_${i}" type="number" step="0.01" value="${p.rate}" oninput="draftSet(${i},'rate',parseFloat(this.value)||1)">
        </div>
      </div>
      <label class="field-label">Kategorier</label>
      <div class="cat-list">${p.categories.map((c,ci)=>`
        <div class="cat-tag"><div style="width:8px;height:8px;border-radius:50%;background:${CAT_COLORS[ci%CAT_COLORS.length]}"></div>${esc(c)}<button class="cat-del" onclick="draftDelCat(${i},${ci})">✕</button></div>`).join('')}
      </div>
      <div class="cat-add-row">
        <input class="cat-input" id="catInput_${i}" placeholder="Ny kategori…" onkeydown="if(event.key==='Enter')draftAddCat(${i})">
        <button class="cat-add-btn" onclick="draftAddCat(${i})">+</button>
      </div>
    </div>`;
  });
  html+=`<button class="add-person-btn" onclick="draftAddPerson()">+ Tilføj person / budget</button><div style="height:16px"></div>`;
  el.innerHTML=html;
}

function draftSet(i,f,v){if(settingsDraft[i])settingsDraft[i][f]=v}
function draftSetCurrency(i,currency){
  if(!settingsDraft[i])return;
  settingsDraft[i].currency=currency;
  const homeCur=settingsDraft[i].homeCurrency;
  const autoRate=getAutoRate(currency,homeCur);
  settingsDraft[i].rate=autoRate;
  // Update the visible rate input immediately
  const rateInp=document.getElementById(`rateInp_${i}`);
  if(rateInp){
    rateInp.value=autoRate;
    rateInp.style.borderColor='var(--blue)';
    setTimeout(()=>{if(rateInp)rateInp.style.borderColor=''},1200);
  }
  // Also update the kurs label text
  const lbl=document.getElementById(`rateLabel_${i}`);
  if(lbl)lbl.textContent=`Kurs (1 ${currency} =)`;
}
function draftSetHomeCurrency(i,homeCurrency){
  if(!settingsDraft[i])return;
  settingsDraft[i].homeCurrency=homeCurrency;
  const currency=settingsDraft[i].currency;
  const autoRate=getAutoRate(currency,homeCurrency);
  settingsDraft[i].rate=autoRate;
  const rateInp=document.getElementById(`rateInp_${i}`);
  if(rateInp){
    rateInp.value=autoRate;
    rateInp.style.borderColor='var(--blue)';
    setTimeout(()=>{if(rateInp)rateInp.style.borderColor=''},1200);
  }
}
function draftRefreshRate(i){
  if(!settingsDraft[i])return;
  settingsDraft[i].rate=autoRate;
  const rateInp=document.getElementById(`rateInp_${i}`);
  if(rateInp){rateInp.value=autoRate;rateInp.style.borderColor='var(--green)';setTimeout(()=>rateInp.style.borderColor='',1200)}
  toast(`Kurs opdateret: 1 ${settingsDraft[i].currency} = ${autoRate} ${settingsDraft[i].homeCurrency}`);
}
function getAutoRate(from,to){
  if(from===to)return 1;
  const fDKK=CURRENCIES[from]?.rate||1;
  const tDKK=CURRENCIES[to]?.rate||1;
  return parseFloat((fDKK/tDKK).toFixed(4));
}
function draftSetColor(i,color,el){
  if(settingsDraft[i])settingsDraft[i].color=color;
  el.closest('.color-swatches').querySelectorAll('.swatch').forEach(s=>s.classList.remove('selected'));
  el.classList.add('selected');
  const av=document.getElementById(`settingsAvatar_${i}`);
  if(av)av.style.background=color;
}
function updateSettingsAvatar(i,name){
  const av=document.getElementById(`settingsAvatar_${i}`);
  if(av)av.textContent=name?name.charAt(0).toUpperCase():'?';
}
function draftDelPerson(i){
  const p=settingsDraft[i];
  if(!p)return;
  showConfirm({
    icon:'🗑️',
    title:`Slet ${p.name}?`,
    sub:'Profil og alle køb slettes permanent',
    confirmLabel:'Ja, slet',
    confirmStyle:'background:var(--red)',
    onConfirm:()=>{
      const id=settingsDraft[i].id;
      S.entries=S.entries.filter(e=>e.personId!==id);
      settingsDraft.splice(i,1);
      buildSettingsHTML();
    }
  });
}
function draftAddPerson(){
  settingsDraft.push({id:'p'+Date.now(),name:'Ny person',color:AVATAR_COLORS[settingsDraft.length%AVATAR_COLORS.length],budget:1000,currency:'EUR',rate:7.46,homeCurrency:'DKK',categories:['Mad','Andet']});
  buildSettingsHTML();setTimeout(()=>document.getElementById('settingsContent').scrollTop=99999,50);
}
function draftAddCat(i){const inp=document.getElementById(`catInput_${i}`);const v=inp?.value.trim();if(!v)return;if(!settingsDraft[i].categories.includes(v))settingsDraft[i].categories.push(v);inp.value='';buildSettingsHTML()}
function draftDelCat(i,ci){settingsDraft[i].categories.splice(ci,1);buildSettingsHTML()}
function saveSettings(){
  settingsDraft.forEach(dp=>{const ex=S.persons.find(p=>p.id===dp.id);if(ex)Object.assign(ex,dp);else S.persons.push(dp)});
  S.persons=S.persons.filter(p=>settingsDraft.find(d=>d.id===p.id));
  if(currentPersonId&&!S.persons.find(p=>p.id===currentPersonId))currentPersonId=S.persons[0]?.id||null;
  saveState();toast('Gemt! ✓');navTo(currentPersonId?'person':'home');
}
function updateApiKey(val){
  S.apiKey=val;saveState();
  const st=document.getElementById('apiStatus');
  if(val.startsWith('sk-ant')){st.textContent='✓ Nøgle gemt';st.className='api-status ok'}
  else if(val){st.textContent='Ser ikke ud som en gyldig nøgle';st.className='api-status err'}
  else{st.textContent='';st.className='api-status'}
}
let apiVis=false;
function toggleApiVis(){apiVis=!apiVis;document.getElementById('apiKeyInput').type=apiVis?'text':'password'}

// ══════════════════════════════════════════════
// MODAL HELPERS
// ══════════════════════════════════════════════
function openModal(id){document.getElementById(id).classList.add('open')}
function closeModal(id){document.getElementById(id).classList.remove('open')}
document.querySelectorAll('.modal-overlay').forEach(m=>m.addEventListener('click',function(e){if(e.target===this)this.classList.remove('open')}));

// ══════════════════════════════════════════════
// UTILS
// ══════════════════════════════════════════════
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
let toastTimer;
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');clearTimeout(toastTimer);toastTimer=setTimeout(()=>t.classList.remove('show'),2400)}

if('serviceWorker' in navigator){window.addEventListener('load',()=>navigator.serviceWorker.register('./sw.js').catch(()=>{}))}

// ══════════════════════════════════════════════
// FIREBASE SYNC
// ══════════════════════════════════════════════
let _fbSyncPause=false;

function syncToFirebase(){
  if(!tripCode||!window._fb||_fbSyncPause)return;
  const {db,ref,set}=window._fb;
  const data={persons:S.persons,entries:S.entries,updatedAt:Date.now()};
  set(ref(db,`trips/${tripCode}`),data).catch(e=>console.warn('FB sync error',e));
}

function subscribeToTrip(code){
  if(fbUnsubscribe){fbUnsubscribe();fbUnsubscribe=null;}
  if(!window._fb)return;
  const {db,ref,onValue}=window._fb;
  fbUnsubscribe=onValue(ref(db,`trips/${code}`),snap=>{
    const data=snap.val();
    if(!data)return;
    _fbSyncPause=true;
    S.persons=data.persons||[];
    S.entries=data.entries||[];
    S.persons.forEach(p=>{if(!p.color)p.color=AVATAR_COLORS[0]});
    localStorage.setItem('tb3_state',JSON.stringify(S));
    _fbSyncPause=false;
    if(currentScreen==='home')renderHome();
    if(currentScreen==='person')renderPersonView();
  });
}

function generateTripCode(){
  return Math.random().toString(36).substring(2,8).toUpperCase();
}

function openTripModal(){
  document.getElementById('tripModalContent').innerHTML=`
    <div style="margin-bottom:20px;padding-bottom:16px;border-bottom:1px solid var(--border)">
      <div style="font-size:17px;font-weight:600;margin-bottom:4px">🌍 Delt rejse</div>
      <div style="font-size:13px;color:var(--text3)">Del din rejse med familie så alle kan se og tilføje køb</div>
    </div>
    ${tripCode?`
    <div style="background:var(--s2);border-radius:var(--r-sm);padding:16px;text-align:center;margin-bottom:16px">
      <div style="font-size:11px;color:var(--text3);margin-bottom:8px;text-transform:uppercase;letter-spacing:1px">Din rejsekode</div>
      <div style="font-size:28px;font-weight:700;letter-spacing:4px;color:var(--yellow);font-family:monospace;margin-bottom:8px">${tripCode}</div>
      <div style="font-size:12px;color:var(--text3)">Del denne kode med familien</div>
    </div>
    <button class="btn-secondary" onclick="copyTripCode()" style="margin-bottom:8px">📋 Kopiér kode</button>
    <button class="btn-secondary" onclick="leaveTrip()" style="color:var(--red)">Forlad delt rejse</button>
    <button class="btn-secondary" onclick="closeModal('tripModal')" style="margin-top:4px">Luk</button>
    `:`
    <button class="btn-primary" onclick="createTrip()" style="margin-bottom:10px">✨ Opret ny delt rejse</button>
    <div style="text-align:center;color:var(--text3);font-size:13px;margin:8px 0">— eller —</div>
    <div class="field-wrap" style="margin-bottom:10px">
      <label class="field-label">Tilslut med kode</label>
      <input class="field-input" id="joinCodeInput" placeholder="F.eks. ABC123" style="text-transform:uppercase;letter-spacing:2px;font-family:monospace;font-size:18px;text-align:center" maxlength="6">
    </div>
    <button class="btn-secondary" onclick="joinTrip()">Tilslut rejse →</button>
    <button class="btn-secondary" onclick="closeModal('tripModal')" style="margin-top:8px">Annuller</button>
    `}`;
  openModal('tripModal');
}

async function createTrip(){
  const code=generateTripCode();
  tripCode=code;
  localStorage.setItem('tb3_tripCode',code);
  if(window._fb){
    const {db,ref,set}=window._fb;
    const data={persons:S.persons,entries:S.entries,updatedAt:Date.now()};
    await set(ref(db,`trips/${code}`),data);
  }
  subscribeToTrip(code);
  openTripModal();
  toast(`Rejse oprettet! Kode: ${code}`);
}

async function joinTrip(){
  const input=document.getElementById('joinCodeInput');
  const code=input?.value.trim().toUpperCase();
  if(!code||code.length<4){toast('Indtast en gyldig kode');return}
  if(!window._fb){toast('Forbinder til database...');return}
  const {db,ref,get}=window._fb;
  const snap=await get(ref(db,`trips/${code}`));
  if(!snap.exists()){toast('Kode ikke fundet — tjek og prøv igen');return}
  const data=snap.val();
  tripCode=code;
  localStorage.setItem('tb3_tripCode',code);
  _fbSyncPause=true;
  S.persons=data.persons||[];
  S.entries=data.entries||[];
  S.persons.forEach(p=>{if(!p.color)p.color=AVATAR_COLORS[0]});
  localStorage.setItem('tb3_state',JSON.stringify(S));
  _fbSyncPause=false;
  subscribeToTrip(code);
  closeModal('tripModal');
  renderHome();
  toast(`Tilsluttet rejse ${code}! ✓`);
}

function leaveTrip(){
  showConfirm({
    icon:'🚪',
    title:'Forlad delt rejse?',
    sub:'Dine lokale data beholdes men synkronisering stopper',
    confirmLabel:'Ja, forlad',
    onConfirm:()=>{
      if(fbUnsubscribe){fbUnsubscribe();fbUnsubscribe=null;}
      tripCode=null;
      localStorage.removeItem('tb3_tripCode');
      closeModal('tripModal');
      renderHome();
      toast('Forladt delt rejse');
    }
  });
}

function copyTripCode(){
  if(tripCode){
    navigator.clipboard.writeText(tripCode).then(()=>toast('Kode kopieret! ✓')).catch(()=>toast(`Kode: ${tripCode}`));
  }
}

// ══════════════════════════════════════════════
// ONLINE / OFFLINE INDICATOR
// ══════════════════════════════════════════════
function updateOnlineStatus(){
  const ready=navigator.onLine && !!S.apiKey;
  const dot=document.getElementById('onlineDot');
  const label=document.getElementById('onlineLabel');
  if(!dot||!label)return;
  if(ready){
    dot.style.background='#06d6a0';
    dot.style.boxShadow='0 0 6px #06d6a0';
    label.textContent='AI klar';
    label.style.color='var(--text3)';
  } else {
    dot.style.background='#ff6b6b';
    dot.style.boxShadow='0 0 6px #ff6b6b';
    label.textContent=!navigator.onLine?'Offline — AI ikke tilgængelig':'AI scanning ikke aktiveret';
    label.style.color='var(--red)';
  }
}
window.addEventListener('online',  updateOnlineStatus);
window.addEventListener('offline', updateOnlineStatus);

// ══════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════
npColor=AVATAR_COLORS[0];

// Reconnect to Firebase trip if we had one
if(tripCode){
  if(window._fbReady){
    subscribeToTrip(tripCode);
  } else {
    window.addEventListener('fbReady',()=>subscribeToTrip(tripCode),{once:true});
  }
}

renderHome();
</script>


</body></html>
